<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cotton Analytics</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: system-ui; margin: 0; padding: 20px; background: #f5f5f5; }
        .header { background: #1a5490; color: white; padding: 20px; margin: -20px -20px 20px -20px; }
        h1 { margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart { background: white; padding: 20px; border-radius: 8px; }
        .loading { text-align: center; padding: 50px; }
        .error { color: red; padding: 20px; background: #fee; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>USDA Cotton Analytics</h1>
        <p id="status">Loading...</p>
    </div>
    
    <div id="loading" class="loading">Loading data...</div>
    <div id="error" class="error" style="display: none;"></div>
    <div id="charts" class="grid" style="display: none;">
        <div class="chart"><h3>National Condition</h3><div id="chart1"></div></div>
        <div class="chart"><h3>Texas Progress</h3><div id="chart2"></div></div>
    </div>

    <script>
        // CHANGE THIS TO YOUR REPO
        const USERNAME = 'BMR-Com';
        const REPO = 'cotton-crop-progress';
        
        // Use CORS proxy for GitHub Releases
        const CSV_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(
            `https://github.com/${USERNAME}/${REPO}/releases/download/data/cotton_historical.csv`
        );

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data.filter(r => r.year && r.Value);
                if (data.length === 0) {
                    showError('No data found');
                    return;
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('charts').style.display = 'grid';
                document.getElementById('status').textContent = `${data.length.toLocaleString()} records loaded`;
                
                // National Condition Chart
                const national = data.filter(r => r.level === 'NATIONAL' && r.data_item_key?.includes('condition_current'));
                const ratings = ['excellent', 'good', 'fair', 'poor', 'very_poor'];
                const colors = ['#27ae60', '#2ecc71', '#f1c40f', '#e67e22', '#c0392b'];
                
                const traces1 = ratings.map((r, i) => {
                    const items = national.filter(x => x.data_item_key === `condition_current_${r}`);
                    return {
                        x: items.map(x => x.week_ending),
                        y: items.map(x => parseFloat(x.Value) || 0),
                        name: r.replace('_', ' '),
                        stackgroup: 'one',
                        line: { color: colors[i] }
                    };
                });
                
                Plotly.newPlot('chart1', traces1, {height: 400, yaxis: {range: [0, 100]}});
                
                // Texas Progress Chart
                const texas = data.filter(r => r.state_name === 'TEXAS' && r.data_item_key?.includes('progress_current'));
                const stages = [
                    ['planted', 'Planted', '#3498db'],
                    ['emerged', 'Emerged', '#9b59b6'],
                    ['squaring', 'Squaring', '#1abc9c'],
                    ['setting_bolls', 'Setting Bolls', '#f39c12'],
                    ['bolls_opening', 'Bolls Opening', '#e67e22'],
                    ['harvested', 'Harvested', '#e74c3c']
                ];
                
                const traces2 = stages.map(([key, name, color]) => {
                    const items = texas.filter(x => x.data_item_key === `progress_current_${key}`);
                    return {
                        x: items.map(x => x.week_ending),
                        y: items.map(x => parseFloat(x.Value) || 0),
                        name: name,
                        line: { color: color }
                    };
                });
                
                Plotly.newPlot('chart2', traces2, {height: 400, yaxis: {range: [0, 100]}});
            },
            error: function(err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error loading data: ' + JSON.stringify(err);
                document.getElementById('status').textContent = 'Error';
            }
        });
    </script>
</body>
</html>
