<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDA NASS Cotton Analytics</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #f5f5f5; 
        }
        .header { 
            background: #1a5490; 
            color: white; 
            padding: 15px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { 
            margin: 0; 
            font-size: 20px; 
            font-weight: 600;
        }
        .header .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }
        .nav {
            background: #fff;
            border-bottom: 1px solid #ddd;
            padding: 10px 20px;
        }
        .nav a {
            color: #1a5490;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        .chart-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        .chart-box { 
            background: white; 
            border: 1px solid #ddd;
            border-radius: 4px; 
            overflow: hidden;
        }
        .chart-header {
            background: #f8f9fa;
            padding: 10px 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chart-header h3 { 
            margin: 0; 
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }
        .state-selector {
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 13px;
            background: white;
        }
        .chart-content {
            padding: 15px;
            height: 400px;
        }
        .loading { 
            text-align: center; 
            padding: 100px; 
            color: #666;
        }
        .error { 
            color: #c0392b; 
            padding: 20px; 
            background: #fee; 
            border-radius: 4px;
            margin: 20px;
        }
        .usda-style {
            font-family: Arial, sans-serif;
        }
        @media (max-width: 768px) { 
            .chart-grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>USDA NASS Cotton Analytics Dashboard</h1>
            <div class="subtitle">Crop Progress and Condition: Cotton in United States</div>
        </div>
        <div id="status">Loading...</div>
    </div>
    
    <div class="nav">
        <a href="index.html" style="color: #1a5490; font-weight: bold;">Dashboard</a>
        <a href="seasonality.html">Seasonality Analysis</a>
    </div>
    
    <div class="container">
        <div id="loading" class="loading">Loading cotton data...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="charts" class="chart-grid" style="display: none;">
            <!-- Chart 1: National Condition (Fixed) -->
            <div class="chart-box">
                <div class="chart-header">
                    <h3>National - Good + Excellent Condition</h3>
                </div>
                <div id="chart-national-condition" class="chart-content"></div>
            </div>
            
            <!-- Chart 2: Texas Condition (Fixed) -->
            <div class="chart-box">
                <div class="chart-header">
                    <h3>Texas - Good + Excellent Condition</h3>
                </div>
                <div id="chart-texas-condition" class="chart-content"></div>
            </div>
            
            <!-- Chart 3: State 1 Progress (Selectable) -->
            <div class="chart-box">
                <div class="chart-header">
                    <h3>
                        <select id="state1-selector" class="state-selector" onchange="updateState1()">
                            <option value="TEXAS" selected>Texas</option>
                            <option value="GEORGIA">Georgia</option>
                            <option value="MISSISSIPPI">Mississippi</option>
                            <option value="ALABAMA">Alabama</option>
                            <option value="ARKANSAS">Arkansas</option>
                            <option value="LOUISIANA">Louisiana</option>
                            <option value="NORTH CAROLINA">North Carolina</option>
                            <option value="SOUTH CAROLINA">South Carolina</option>
                            <option value="TENNESSEE">Tennessee</option>
                            <option value="OKLAHOMA">Oklahoma</option>
                            <option value="KANSAS">Kansas</option>
                            <option value="MISSOURI">Missouri</option>
                            <option value="FLORIDA">Florida</option>
                            <option value="VIRGINIA">Virginia</option>
                            <option value="CALIFORNIA">California</option>
                            <option value="ARIZONA">Arizona</option>
                            <option value="NEW MEXICO">New Mexico</option>
                        </select>
                        - Crop Progress
                    </h3>
                </div>
                <div id="chart-state1-progress" class="chart-content"></div>
            </div>
            
            <!-- Chart 4: State 2 Progress (Selectable) -->
            <div class="chart-box">
                <div class="chart-header">
                    <h3>
                        <select id="state2-selector" class="state-selector" onchange="updateState2()">
                            <option value="TEXAS">Texas</option>
                            <option value="GEORGIA" selected>Georgia</option>
                            <option value="MISSISSIPPI">Mississippi</option>
                            <option value="ALABAMA">Alabama</option>
                            <option value="ARKANSAS">Arkansas</option>
                            <option value="LOUISIANA">Louisiana</option>
                            <option value="NORTH CAROLINA">North Carolina</option>
                            <option value="SOUTH CAROLINA">South Carolina</option>
                            <option value="TENNESSEE">Tennessee</option>
                            <option value="OKLAHOMA">Oklahoma</option>
                            <option value="KANSAS">Kansas</option>
                            <option value="MISSOURI">Missouri</option>
                            <option value="FLORIDA">Florida</option>
                            <option value="VIRGINIA">Virginia</option>
                            <option value="CALIFORNIA">California</option>
                            <option value="ARIZONA">Arizona</option>
                            <option value="NEW MEXICO">New Mexico</option>
                        </select>
                        - Crop Progress
                    </h3>
                </div>
                <div id="chart-state2-progress" class="chart-content"></div>
            </div>
        </div>
    </div>

    <script>
        const USERNAME = 'BMR-Com';
        const REPO = 'cotton-crop-progress';
        const BRANCH = 'main';
        
        const FILES = [
            'cotton_2001_2005.csv',
            'cotton_2006_2010.csv',
            'cotton_2011_2015.csv',
            'cotton_2016_2020.csv',
            'cotton_2021_2025.csv'
        ];
        
        const BASE_URL = `https://cdn.jsdelivr.net/gh/${USERNAME}/${REPO}@${BRANCH}/data`;
        
        let allData = [];
        let loadedCount = 0;
        
        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }
        
        function loadFile(filename) {
            return new Promise((resolve, reject) => {
                Papa.parse(`${BASE_URL}/${filename}`, {
                    download: true,
                    header: true,
                    complete: function(results) {
                        const data = results.data.filter(r => r.year && r.Value);
                        allData = allData.concat(data);
                        loadedCount++;
                        document.getElementById('status').textContent = 
                            `Loading ${loadedCount}/${FILES.length}...`;
                        resolve();
                    },
                    error: reject
                });
            });
        }
        
        // USDA Style Colors
        const YEAR_COLORS = {
            '2021': '#6b4c9a', // Purple
            '2022': '#4a90d9', // Blue
            '2023': '#5a9a5a', // Green
            '2024': '#d4a574', // Tan
            '2025': '#c44e4e'  // Red
        };
        
        const PROGRESS_COLORS = {
            'planted': '#8b4513',
            'emerged': '#d2691e',
            'squaring': '#cd853f',
            'setting_bolls': '#daa520',
            'bolls_opening': '#b8860b',
            'harvested': '#d2b48c'
        };
        
        function createConditionChart(elementId, stateFilter) {
            const filtered = allData.filter(r => 
                (stateFilter === 'NATIONAL' ? r.level === 'NATIONAL' : r.state_name === stateFilter) &&
                r.data_item_key && 
                (r.data_item_key.includes('condition_current_good') || r.data_item_key.includes('condition_current_excellent'))
            );
            
            // Group by year and week
            const years = [...new Set(filtered.map(r => r.year))].sort();
            
            const traces = years.map(year => {
                const yearData = filtered.filter(r => r.year === year);
                // Sum good + excellent
                const weeks = [...new Set(yearData.map(r => r.week_ending))].sort();
                const values = weeks.map(week => {
                    const weekData = yearData.filter(r => r.week_ending === week);
                    const good = weekData.find(r => r.data_item_key === 'condition_current_good');
                    const excellent = weekData.find(r => r.data_item_key === 'condition_current_excellent');
                    return (parseFloat(good?.Value) || 0) + (parseFloat(excellent?.Value) || 0);
                });
                
                return {
                    x: weeks.map(w => {
                        const d = new Date(w);
                        return `${d.getMonth()+1}/${d.getDate()}`;
                    }),
                    y: values,
                    name: year,
                    type: 'scatter',
                    mode: 'lines',
                    line: { 
                        color: YEAR_COLORS[year] || '#999', 
                        width: year === '2025' ? 3 : 2 
                    }
                };
            });
            
            Plotly.newPlot(elementId, traces, {
                height: 350,
                margin: { t: 30, b: 50, l: 60, r: 30 },
                xaxis: { 
                    title: '',
                    tickangle: 0,
                    showgrid: true,
                    gridcolor: '#eee'
                },
                yaxis: { 
                    title: 'Good + Excellent (percent)',
                    range: [0, 80],
                    ticksuffix: '%',
                    showgrid: true,
                    gridcolor: '#eee'
                },
                legend: {
                    orientation: 'v',
                    x: 0.02,
                    y: 0.98,
                    bgcolor: 'rgba(255,255,255,0.8)',
                    bordercolor: '#ccc',
                    borderwidth: 1
                },
                plot_bgcolor: '#fafafa',
                paper_bgcolor: 'white',
                font: { family: 'Arial, sans-serif', size: 11 }
            });
        }
        
        function createProgressChart(elementId, stateName) {
            const filtered = allData.filter(r => 
                r.state_name === stateName && 
                r.data_item_key && 
                r.data_item_key.includes('progress_current')
            );
            
            const stages = [
                {key: 'planted', label: 'Planted', color: '#8b4513'},
                {key: 'emerged', label: 'Emerged', color: '#d2691e'},
                {key: 'squaring', label: 'Squaring', color: '#cd853f'},
                {key: 'setting_bolls', label: 'Setting bolls', color: '#daa520'},
                {key: 'bolls_opening', label: 'Bolls opening', color: '#b8860b'},
                {key: 'harvested', label: 'Harvested', color: '#d2b48c'}
            ];
            
            // Get 2025 data (solid lines) and 2024 data (dashed)
            const traces = [];
            
            // 2025 data - solid lines
            const data2025 = filtered.filter(r => r.year === '2025');
            stages.forEach(stage => {
                const items = data2025.filter(r => r.data_item_key === `progress_current_${stage.key}`);
                if (items.length > 0) {
                    traces.push({
                        x: items.map(r => {
                            const d = new Date(r.week_ending);
                            return `${d.getMonth()+1}/${d.getDate()}`;
                        }),
                        y: items.map(r => parseFloat(r.Value) || 0),
                        name: stage.label,
                        type: 'scatter',
                        mode: 'lines',
                        line: { 
                            color: stage.color, 
                            width: 2,
                            dash: 'solid'
                        }
                    });
                }
            });
            
            // 2024 data - dashed lines (for comparison)
            const data2024 = filtered.filter(r => r.year === '2024');
            stages.forEach(stage => {
                const items = data2024.filter(r => r.data_item_key === `progress_current_${stage.key}`);
                if (items.length > 0) {
                    traces.push({
                        x: items.map(r => {
                            const d = new Date(r.week_ending);
                            return `${d.getMonth()+1}/${d.getDate()}`;
                        }),
                        y: items.map(r => parseFloat(r.Value) || 0),
                        name: stage.label + ' (2024)',
                        type: 'scatter',
                        mode: 'lines',
                        line: { 
                            color: stage.color, 
                            width: 1.5,
                            dash: 'dot'
                        },
                        showlegend: false,
                        opacity: 0.6
                    });
                }
            });
            
            Plotly.newPlot(elementId, traces, {
                height: 350,
                margin: { t: 30, b: 50, l: 60, r: 30 },
                xaxis: { 
                    title: '',
                    showgrid: true,
                    gridcolor: '#eee'
                },
                yaxis: { 
                    title: 'Percent',
                    range: [0, 100],
                    ticksuffix: '%',
                    showgrid: true,
                    gridcolor: '#eee'
                },
                legend: {
                    orientation: 'v',
                    x: 0.02,
                    y: 0.5,
                    bgcolor: 'rgba(255,255,255,0.8)',
                    bordercolor: '#ccc',
                    borderwidth: 1
                },
                plot_bgcolor: '#fafafa',
                paper_bgcolor: 'white',
                annotations: stages.map((s, i) => ({
                    x: 0.5,
                    y: 50 + (i * 10),
                    xref: 'paper',
                    yref: 'y',
                    text: s.label,
                    showarrow: false,
                    font: { color: s.color, size: 12, weight: 'bold' }
                })),
                font: { family: 'Arial, sans-serif', size: 11 }
            });
        }
        
        function updateState1() {
            const state = document.getElementById('state1-selector').value;
            createProgressChart('chart-state1-progress', state);
        }
        
        function updateState2() {
            const state = document.getElementById('state2-selector').value;
            createProgressChart('chart-state2-progress', state);
        }
        
        // Load all files
        Promise.all(FILES.map(loadFile))
            .then(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('charts').style.display = 'grid';
                document.getElementById('status').textContent = 
                    `Updated: ${new Date().toLocaleDateString()} | ${allData.length.toLocaleString()} records`;
                
                // Create charts
                createConditionChart('chart-national-condition', 'NATIONAL');
                createConditionChart('chart-texas-condition', 'TEXAS');
                createProgressChart('chart-state1-progress', 'TEXAS');
                createProgressChart('chart-state2-progress', 'GEORGIA');
            })
            .catch(err => {
                console.error('Failed:', err);
                showError('Failed to load data: ' + err.message);
            });
    </script>
</body>
</html>
