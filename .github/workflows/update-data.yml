name: Update Cotton Data

on:
  schedule:
    - cron: '0 20 * 4-11 1'  # Mondays 4PM ET
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install requests pandas
      
      - name: Download existing CSVs from dataset branch
        run: |
          git fetch origin dataset
          for file in cotton_2001_2005.csv cotton_2006_2010.csv cotton_2011_2015.csv cotton_2016_2020.csv cotton_2021_2025.csv; do
            git show origin/dataset:$file > $file 2>/dev/null || echo "No $file"
          done
      
      - name: Fetch new data and update files
        env:
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
        run: python update_data.py
      
      - name: Push updated CSVs to dataset branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Store updated files
          mkdir -p /tmp/cotton-data
          cp cotton_*.csv /tmp/cotton-data/
          
          # Switch to dataset branch
          git fetch origin dataset
          git checkout dataset
          
          # Replace files
          cp /tmp/cotton-data/cotton_*.csv .
          
          # Commit and push
          git add cotton_*.csv
          git commit -m "Update cotton data $(date -u +%Y-%m-%d)" || echo "No changes"
          git push origin dataset
          
          # Back to main
          git checkout main
