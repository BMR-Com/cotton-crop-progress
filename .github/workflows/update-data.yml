name: Update Cotton Data

on:
  schedule:
    - cron: '0 20 * 4-11 1'  # Mondays 4PM ET
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install requests pandas
      
      - name: Download existing CSV from release
        run: |
          curl -L -o cotton_historical.csv \
            "https://github.com/${{ github.repository }}/releases/download/data/cotton_historical.csv" || echo "No existing file"
      
      - name: Fetch new data and append
        env:
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
        run: python update_data.py
      
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete data --yes 2>/dev/null || true
          gh release create data cotton_historical.csv --title "Cotton Data" --notes "Updated $(date)"
